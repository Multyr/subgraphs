# =============================================================================
# OPS DASHBOARD — Deployment Wiring Entities
# =============================================================================

# Protocol-level deployment: shared components per chain. ID: "protocol-deploy-{chainId}"
type ProtocolDeployment @entity {
  id: ID!
  chainId: Int!

  # Shared components
  vaultFactory: Bytes
  globalConfig: Bytes
  priceOracle: Bytes
  depositRouter: Bytes
  referralBinding: Bytes
  opsCollector: Bytes
  feeDistributor: Bytes
  epochPayout: Bytes
  peripheryUpkeep: Bytes
  feeCollectorUpkeep: Bytes
  partnerRegistry: Bytes

  updatedAt: BigInt!
  updatedAtBlock: BigInt!
}

# Per-vault deployment wiring. ID: "{vaultAddress}-{chainId}"
type VaultDeployment @entity {
  id: ID!
  chainId: Int!

  coreVault: Vault!

  # Core wiring
  bufferManager: Bytes
  queueModule: Bytes
  adminModule: Bytes
  strategyRouter: Bytes
  healthRegistry: Bytes
  feeCollector: Bytes
  oracle: Bytes
  paramsProvider: Bytes
  incentives: Bytes

  # Governance
  owner: Bytes
  guardian: Bytes
  vetoer: Bytes
  sealed: Boolean!

  # Automation
  vaultUpkeep: Bytes

  # Reference
  protocolDeployment: ProtocolDeployment

  updatedAt: BigInt!
  updatedAtBlock: BigInt!
}

# Per-strategy deployment wiring. ID: "{strategyAddress}-{vaultId}"
type StrategyDeployment @entity {
  id: ID!
  chainId: Int!

  vault: Vault!
  strategyAddress: Bytes!
  strategyRouter: Bytes

  # Strategy state
  enabled: Boolean!
  priority: Int!
  weightBps: Int!
  totalAssets: BigInt!

  # Automation
  strategyUpkeep: Bytes
  upkeepKind: String   # "lending", "multiply", etc.

  updatedAt: BigInt!
  updatedAtBlock: BigInt!
}

# Adapter binding within a strategy. ID: "{strategyAddress}-{adapterAddress}"
type AdapterBinding @entity {
  id: ID!
  chainId: Int!

  strategy: StrategyDeployment!
  vault: Vault!
  adapter: Bytes!

  enabled: Boolean!
  flagged: Boolean!
  activatedAt: BigInt
  consecutiveFailures: Int!
  quarantined: Boolean!

  createdAtBlock: BigInt!
  updatedAtBlock: BigInt!
}

# Binding: VaultUpkeep → Vault. ID: "{upkeepAddress}-{vaultId}"
type VaultUpkeepBinding @entity {
  id: ID!
  chainId: Int!

  upkeep: Bytes!
  vault: Vault!

  updatedAt: BigInt!
}

# Binding: StrategyUpkeep → Strategy. ID: "{upkeepAddress}-{strategyAddress}"
type StrategyUpkeepBinding @entity {
  id: ID!
  chainId: Int!

  strategyUpkeep: Bytes!
  strategyAddress: Bytes!
  upkeepKind: String   # "lending", "multiply"

  vault: Vault

  updatedAt: BigInt!
}

# =============================================================================
# INCENTIVES ENGINE v2 (Tranche-Based)
# =============================================================================

enum RewardMode {
  VAULT_SHARES
  MULTYR_TOKEN
  USDC
}

# Per-deposit tranche
type DepositTranche @entity {
  id: ID!                    # {engine}-{user}-{trancheIdx}
  engine: Bytes!
  user: Bytes!
  trancheIdx: BigInt!
  principalWad: BigInt!
  depositTs: BigInt!
  lastAccrualTs: BigInt!
  paramsId: Int!
  active: Boolean!
  createdAt: BigInt!
  updatedAt: BigInt!
}

# Reward vesting tranche
type RewardVestingTranche @entity {
  id: ID!                    # {engine}-{user}-{vestingIdx}
  engine: Bytes!
  user: Bytes!
  vestingIdx: BigInt!
  rewardUnits: BigInt!
  vestStart: BigInt!
  vestDurationDays: Int!
  withdrawnUnits: BigInt!
  paramsId: Int!
  mode: RewardMode!
  conversionRatio: BigInt!
  active: Boolean!
  createdAt: BigInt!
  updatedAt: BigInt!
}

# Incentive parameter set
type IncentiveParamsSet @entity {
  id: ID!                    # {engine}-{paramsId}
  engine: Bytes!
  paramsId: Int!
  cliffDays: Int!
  fullDays: Int!
  vestingDays: Int!
  bmaxWad: BigInt!
  rewardMode: RewardMode!
  active: Boolean!
  effectiveFrom: BigInt!
  blockTimestamp: BigInt!
  txHash: Bytes!
}
