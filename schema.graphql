  ASSET_CONFIG_SET    # AssetOracleConfigSet(asset, oracle, maxStaleness)
  VAULT_OVERRIDE_SET  # VaultOracleOverrideSet(vault, oracle, maxStaleness)
  DEFAULT_CONFIG_SET  # DefaultOracleConfigSet(oracle, maxStaleness)
}

# Oracle registry configuration event. ID: txHash-logIndex
type OracleRegistryEvent @entity {
