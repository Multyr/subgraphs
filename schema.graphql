# =============================================================================
# MULTYR VAULT SUBGRAPH SCHEMA v2.0
# =============================================================================
# Full-featured schema for DApp UI - replicates Morpho Blue GraphQL capabilities
# All numeric values are in wei (BigInt) unless specified as BigDecimal
# Standard: sharePrice and prices use 1e18 scaling
# =============================================================================

# =============================================================================
# ENUMS
# =============================================================================

# Transaction types for vault operations
enum TransactionType {
  DEPOSIT
  WITHDRAW
  FORCE_WITHDRAW
  TRANSFER
  CLAIM
  CLAIM_REQUEST
  CLAIM_CANCEL
}

# Vault status
enum VaultStatus {
  ACTIVE
  PAUSED
  DEPRECATED
}

# Strategy health state
enum StrategyState {
  OK
  DEGRADED
  BROKEN
}

# Price status for USD values
enum PriceStatus {
  VALID           # Price from Chainlink oracle
  STALE           # Price older than threshold (e.g., 1 hour)
  FALLBACK        # Using hardcoded fallback (1.0 for stablecoins)
  MISSING         # No price source available - USD values are 0
}

# =============================================================================
# CORE ENTITIES
# =============================================================================

# Protocol-wide singleton for global stats. ID: "protocol-{chainId}"
type Protocol @entity {
  id: ID!
  chainId: Int!
  factoryAddress: Bytes!
  totalVaults: Int!
  totalTvlUsd: BigDecimal!
  totalUsers: Int!
  updatedAt: BigInt!
}

# Vault Factory - tracks all deployed vaults. ID: factoryAddress-chainId (lowercase)
type VaultFactory @entity {
  id: ID!
  address: Bytes!
  chainId: Int!
  vaultCount: Int!
  totalTvlUsd: BigDecimal!
  vaults: [Vault!]! @derivedFrom(field: "factory")
  createdAt: BigInt!
  createdAtBlock: BigInt!
}

# ERC-4626 Vault - main vault entity with current state. ID: vaultAddress-chainId (lowercase)
type Vault @entity {
  id: ID!
  factory: VaultFactory

  # Identity
  address: Bytes!
  chainId: Int!

  # ERC-20 / ERC-4626 Metadata
  name: String!
  symbol: String!
  decimals: Int!
  asset: Bytes!
  assetSymbol: String!
  assetDecimals: Int!

  # Creation metadata
  createdAt: BigInt!
  createdAtBlock: BigInt!
  createdTxHash: Bytes!
  creator: Bytes

  # Current state (updated on every tx)
  totalAssets: BigInt!
  totalSupply: BigInt!
  sharePrice: BigInt!

  # USD values (updated via oracle or config)
  tvlUsd: BigDecimal!
  assetPriceUsd: BigDecimal!
  priceStatus: PriceStatus!

  # Performance metrics (computed from day data)
  apy1d: BigDecimal!
  apy7d: BigDecimal!
  apy30d: BigDecimal!

  # Vault configuration
  depositFeeBps: Int!
  withdrawFeeBps: Int!
  immediateExitPenaltyBps: Int!
  forceExitPenaltyBps: Int!

  # Status flags
  status: VaultStatus!
  statusLabel: String!            # Custom status label (e.g. "WITHDRAW_ONLY", "MIGRATING")
  statusNote: String!             # Human-readable explanation for end users
  isActive: Boolean!
  depositsEnabled: Boolean!
  withdrawalsEnabled: Boolean!

  # Components (addresses)
  bufferManager: Bytes
  strategyRouter: Bytes
  healthRegistry: Bytes
  paramsProvider: Bytes
  incentives: Bytes
  feeCollector: Bytes
  guardian: Bytes
  vetoer: Bytes
  oracle: Bytes
  owner: Bytes

  # Statistics
  totalDeposits: BigInt!
  totalWithdrawals: BigInt!
  totalUsers: Int!
  transactionCount: Int!

  updatedAt: BigInt!

  # Ops deployment wiring
  deployment: VaultDeployment @derivedFrom(field: "coreVault")

  # Derived relations
  dayData: [VaultDayData!]! @derivedFrom(field: "vault")
  positions: [UserVaultPosition!]! @derivedFrom(field: "vault")
  transactions: [Transaction!]! @derivedFrom(field: "vault")
  strategies: [VaultStrategy!]! @derivedFrom(field: "vault")
  strategyDeployments: [StrategyDeployment!]! @derivedFrom(field: "vault")
  upkeepBindings: [VaultUpkeepBinding!]! @derivedFrom(field: "vault")
}

# Vault daily snapshot - historical performance tracking. ID: vaultId-dayId
type VaultDayData @entity {
  id: ID!
  vault: Vault!
  chainId: Int!

  date: Int!
  dateTimestamp: BigInt!

  # State snapshot
  totalAssets: BigInt!
  totalSupply: BigInt!
  sharePrice: BigInt!

  # USD values
  tvlUsd: BigDecimal!
  assetPriceUsd: BigDecimal!

  # Performance
  dailyReturn: BigDecimal!
  apy: BigDecimal!

  # Volume
  depositsAssets: BigInt!
  depositsUsd: BigDecimal!
  withdrawalsAssets: BigInt!
  withdrawalsUsd: BigDecimal!
  netFlowAssets: BigInt!
  netFlowUsd: BigDecimal!

  # Counts
  depositCount: Int!
  withdrawCount: Int!
  uniqueUsers: Int!
}

# =============================================================================
# USER POSITION ENTITIES
# =============================================================================

# User position in a vault - aggregated state with FIFO cost basis. ID: vaultId-userAddress (lowercase)
type UserVaultPosition @entity {
  id: ID!
  user: Bytes!
  vault: Vault!
  chainId: Int!

  # Current holdings
  shares: BigInt!
  assets: BigInt!
  assetsUsd: BigDecimal!

  # Cost basis tracking (FIFO)
  netDepositedAssets: BigInt!
  netDepositedUsd: BigDecimal!
  costBasisFifoAssets: BigInt!
  costBasisFifoUsd: BigDecimal!

  # P&L tracking
  realizedPnlAssets: BigInt!
  realizedPnlUsd: BigDecimal!
  unrealizedPnlAssets: BigInt!
  unrealizedPnlUsd: BigDecimal!

  # Earned (total gains)
  earnedAssets: BigInt!
  earnedUsd: BigDecimal!

  # Cumulative stats
  totalDepositedAssets: BigInt!
  totalDepositedUsd: BigDecimal!
  totalWithdrawnAssets: BigInt!
  totalWithdrawnUsd: BigDecimal!

  # Timestamps
  createdAt: BigInt!
  updatedAt: BigInt!
  lastDepositAt: BigInt
  lastWithdrawAt: BigInt

  # Transaction count
  depositCount: Int!
  withdrawCount: Int!

  # FIFO lots for accurate cost basis
  lots: [PositionLot!]! @derivedFrom(field: "position")
  dayData: [UserPositionDayData!]! @derivedFrom(field: "position")
}

# Position lot for FIFO cost basis tracking. ID: positionId-lotIndex
type PositionLot @entity {
  id: ID!
  position: UserVaultPosition!
  lotIndex: Int!

  # Original deposit
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!

  sharesBought: BigInt!
  assetsCost: BigInt!
  usdCost: BigDecimal!
  sharePriceAtBuy: BigInt!
  assetPriceUsdAtBuy: BigDecimal!

  # Current state
  sharesRemaining: BigInt!

  isFullyConsumed: Boolean!
}

# User position daily snapshot. ID: positionId-dayId
type UserPositionDayData @entity {
  id: ID!
  position: UserVaultPosition!
  vault: Vault!
  user: Bytes!
  chainId: Int!

  date: Int!
  dateTimestamp: BigInt!

  # Snapshot
  shares: BigInt!
  assets: BigInt!
  assetsUsd: BigDecimal!
  sharePrice: BigInt!
  assetPriceUsd: BigDecimal!

  # Cumulative at end of day
  totalDepositedAssets: BigInt!
  totalWithdrawnAssets: BigInt!
  realizedPnlAssets: BigInt!
  unrealizedPnlAssets: BigInt!
  earnedAssets: BigInt!
}

# =============================================================================
# TRANSACTION ENTITIES
# =============================================================================

# Transaction - individual vault operation with full audit trail. ID: txHash-logIndex
type Transaction @entity {
  id: ID!
  hash: Bytes!
  logIndex: BigInt!

  vault: Vault!
  user: Bytes!
  chainId: Int!

  type: TransactionType!

  # Amounts
  shares: BigInt!
  assets: BigInt!
  assetsUsd: BigDecimal!

  # For transfers
  from: Bytes
  to: Bytes
  receiver: Bytes

  # For claims
  claimId: BigInt

  # Metadata
  timestamp: BigInt!
  blockNumber: BigInt!
  gasUsed: BigInt
  gasPrice: BigInt

  # Price at tx time
  sharePrice: BigInt!
  assetPriceUsd: BigDecimal!
}

# Pending claim request. ID: vaultId-claimId
type ClaimRequest @entity {
  id: ID!
  vault: Vault!
  user: Bytes!
  chainId: Int!

  claimId: BigInt!
  shares: BigInt!
  assetsEstimated: BigInt!

  isImmediate: Boolean!
  status: String!

  requestedAt: BigInt!
  requestTxHash: Bytes!

  settledAt: BigInt
  settleTxHash: Bytes
  assetsReceived: BigInt

  cancelledAt: BigInt
  cancelTxHash: Bytes
}

# Force withdraw event - guaranteed exit operation. ID: txHash-logIndex
type ForceWithdrawEvent @entity {
  id: ID!
  vault: Vault!
  chainId: Int!

  caller: Bytes!
  owner: Bytes!
  receiver: Bytes!
  assets: BigInt!
  sharesSpent: BigInt!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# =============================================================================
# STRATEGY ENTITIES
# =============================================================================

# Strategy registered with vault's router. ID: routerAddress-chainId-strategyAddress
type VaultStrategy @entity {
  id: ID!
  vault: Vault
  router: StrategyRouter
  strategy: Bytes!
  chainId: Int!

  # Metadata (read from strategy contract)
  name: String
  description: String

  # Config
  priority: Int!
  weightBps: Int!
  enabled: Boolean!

  # Current state
  totalAssets: BigInt!
  lastHarvestAt: BigInt

  # Harvest telemetry (PR-B)
  lastHarvestPnl: BigInt
  lastHarvestRealized: BigInt
  lastHarvestTimestamp: BigInt
  lastHarvestFailed: Boolean
  totalHarvestCount: BigInt!
  totalHarvestFailCount: BigInt!

  createdAt: BigInt!
  updatedAt: BigInt!
}

# =============================================================================
# PRICING ENTITIES
# =============================================================================

# Token price tracking. ID: tokenAddress-chainId
type TokenPrice @entity {
  id: ID!
  token: Bytes!
  chainId: Int!
  symbol: String!
  decimals: Int!

  priceUsd: BigDecimal!
  source: String!
  status: PriceStatus!

  updatedAt: BigInt!
  updatedAtBlock: BigInt!
}

# Chainlink oracle configuration. ID: tokenAddress-chainId
type ChainlinkFeed @entity {
  id: ID!
  token: Bytes!
  chainId: Int!
  feedAddress: Bytes!
  decimals: Int!
  description: String!
  isActive: Boolean!
}

# =============================================================================
# AGGREGATED USER ENTITY
# =============================================================================

# User aggregate across all vaults on a chain. ID: userAddress-chainId
type User @entity {
  id: ID!
  address: Bytes!
  chainId: Int!

  # Aggregated stats
  totalPositions: Int!
  totalAssetsUsd: BigDecimal!
  totalEarnedUsd: BigDecimal!
  totalRealizedPnlUsd: BigDecimal!

  firstSeenAt: BigInt!
  lastActiveAt: BigInt!
}

# =============================================================================
# OPS / TELEMETRY ENTITIES
# =============================================================================

# VaultUpkeep action - Chainlink Automation keeper operations. ID: txHash-logIndex
type UpkeepAction @entity {
  id: ID!
  chainId: Int!
  upkeep: Bytes!
  op: Int!
  arg: BigInt!
  success: Boolean!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# VaultUpkeep RealizeForQueue failure event. ID: txHash-logIndex
type RealizeForQueueFailureEvent @entity {
  id: ID!
  chainId: Int!
  target: BigInt!
  reason: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# VaultUpkeep parameter change events. ID: txHash-logIndex
type UpkeepConfigEvent @entity {
  id: ID!
  chainId: Int!
  paramName: String!
  value: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Strategy rebalance event (inter-strategy). ID: txHash-logIndex
type StrategyRebalanceEvent @entity {
  id: ID!
  chainId: Int!
  totalMoved: BigInt!
  strategyCount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# MinDelay timelock events. ID: txHash-logIndex
type MinDelayEvent @entity {
  id: ID!
  chainId: Int!
  action: String!  # "submitted", "accepted", "revoked"
  newDelay: BigInt
  eta: BigInt
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# IncentivesEngine reconcile lifecycle events. ID: txHash-logIndex
type ReconcileEvent @entity {
  id: ID!
  chainId: Int!
  eventType: String!  # "pending", "reconciled", "failed", "skipped", "batchCompleted"
  user: Bytes
  pendingId: BigInt
  assetsExitedWad: BigInt
  vestedUnits: BigInt
  slashedUnits: BigInt
  processed: BigInt
  remaining: BigInt
  reason: Bytes
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# FeeDistributor pause events. ID: txHash-logIndex
type PauseEvent @entity {
  id: ID!
  chainId: Int!
  contract: String!
  pauseType: String!  # "redeem", "funding"
  paused: Boolean!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# =============================================================================
# EVENT AUDIT TRAIL ENTITIES
# =============================================================================

# Fee event types
enum FeeEventType {
  DEPOSIT_FEE
  WITHDRAW_FEE
  IMMEDIATE_EXIT_PENALTY
  IMMEDIATE_EXIT_PENALTY_UPDATED
  FORCE_EXIT_PENALTY
  FORCE_EXIT_PENALTY_UPDATED
  PERF_MINT
  CRYSTALLIZE
}

# Fee event - tracks all fee-related events. ID: txHash-logIndex
type FeeEvent @entity {
  id: ID!
  vault: Vault!
  chainId: Int!
  type: FeeEventType!

  # For deposit/withdraw fees
  sender: Bytes
  assetsFee: BigInt
  sharesToTreasury: BigInt

  # For crystallize
  oldHwm: BigInt
  newHwm: BigInt
  feeAssets: BigInt

  # For perf mint
  hwmBefore: BigInt
  ppsBefore: BigInt
  sharesMinted: BigInt
  ppsAfter: BigInt

  # For immediate exit penalty updated
  oldBps: BigInt
  newBps: BigInt

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Crystallization event - high-water-mark reset and fee capture. ID: txHash-logIndex
type Crystallization @entity {
  id: ID!
  vault: Vault!
  chainId: Int!

  oldHwm: BigInt!
  newHwm: BigInt!
  feeAssets: BigInt!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Performance fee mint event. ID: txHash-logIndex
type PerfFeeMint @entity {
  id: ID!
  vault: Vault!
  chainId: Int!

  hwmBefore: BigInt!
  ppsBefore: BigInt!
  sharesMinted: BigInt!
  ppsAfter: BigInt!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Strategy route event - assets routed to strategy. ID: txHash-logIndex
type StrategyRoute @entity {
  id: ID!
  vault: Vault!
  chainId: Int!

  strategy: Bytes!
  amount: BigInt!
  cashAfter: BigInt!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Vault realization event. ID: txHash-logIndex
type VaultRealization @entity {
  id: ID!
  vault: Vault!
  chainId: Int!

  amount: BigInt!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Reserve restore event. ID: txHash-logIndex
type ReserveRestore @entity {
  id: ID!
  vault: Vault!
  chainId: Int!

  cashAfter: BigInt!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Epoch event. ID: txHash-logIndex
type EpochEvent @entity {
  id: ID!
  vault: Vault!
  chainId: Int!

  newEpochStart: BigInt!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

