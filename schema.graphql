}

# =============================================================================
# PERIPHERY REWARDS PIPELINE ENTITIES
# =============================================================================
# Contracts: OpsCollector, FeeDistributor, EpochPayout, ReferralBinding,
#            PartnerRegistry, DepositRouter
# Pipeline: FeeCollector → OpsCollector → FeeDistributor → EpochPayout (Merkle)
# =============================================================================

# --- OpsCollector Events ---

# OpsCollector.split() executed — shares split between ops wallet and growth (FeeDistributor)
# ID: txHash-logIndex
type OpsSplitEvent @entity {
  id: ID!
  chainId: Int!

  totalShares: BigInt!
  opsShares: BigInt!
  growthShares: BigInt!
  opsWallet: Bytes!
  feeDistributor: Bytes!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# OpsCollector split params updated
# ID: txHash-logIndex
type OpsSplitParamsEvent @entity {
  id: ID!
  chainId: Int!

  opsBps: Int!
  growthBps: Int!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# OpsCollector wallet or distributor address updated
# ID: txHash-logIndex
type OpsAddressUpdateEvent @entity {
  id: ID!
  chainId: Int!

  updateType: String!     # "OPS_WALLET" or "FEE_DISTRIBUTOR"
  oldAddress: Bytes!
  newAddress: Bytes!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# --- FeeDistributor Events ---

# FeeDistributor.redeemShares() — vault shares redeemed for USDC
# ID: txHash-logIndex
type FeeDistributorRedeemEvent @entity {
  id: ID!
  chainId: Int!

  sharesToRedeem: BigInt!
  actualSharesRedeemed: BigInt!
  assetsReceived: BigInt!
  epochId: Int!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# FeeDistributor.fundEpochPayout() — USDC sent to EpochPayout
# ID: txHash-logIndex
type EpochFundedEvent @entity {
  id: ID!
  chainId: Int!

  epochId: Int!
  assets: BigInt!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# FeeDistributor epoch advanced
# ID: txHash-logIndex
type EpochAdvancedEvent @entity {
  id: ID!
  chainId: Int!

  newEpochId: Int!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# FeeDistributor guardrails updated
# ID: txHash-logIndex
type FeeDistributorGuardrailsEvent @entity {
  id: ID!
  chainId: Int!

  maxRedeemPerEpoch: BigInt!
  minDelayBetweenRedeems: BigInt!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# FeeDistributor EpochPayout address updated
# ID: txHash-logIndex
type FeeDistributorPayoutUpdateEvent @entity {
  id: ID!
  chainId: Int!

  oldPayout: Bytes!
  newPayout: Bytes!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# --- EpochPayout Events (Merkle Distributor) ---

# EpochPayout.publishRoot() — Merkle root published for an epoch
# ID: txHash-logIndex
type EpochRootPublishedEvent @entity {
  id: ID!
  chainId: Int!

  epochId: Int!
  root: Bytes!
  metadataHash: Bytes!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# EpochPayout.claim() — beneficiary claims rewards via Merkle proof
# ID: txHash-logIndex
type EpochClaimedEvent @entity {
  id: ID!
  chainId: Int!

  epochId: Int!
  category: Bytes!            # keccak256("REFERRAL") or keccak256("PARTNER")
  beneficiary: Bytes!
  amount: BigInt!
  metadataHash: Bytes!
  claimedBy: Bytes!           # msg.sender (may differ from beneficiary for third-party claims)

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# --- ReferralBinding Events ---

# ReferralBinding.bind() or bindFor() — user bound to referrer (set-once)
# ID: txHash-logIndex
type ReferralBoundEvent @entity {
  id: ID!
  chainId: Int!

  user: Bytes!
  referrer: Bytes!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
