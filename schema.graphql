# Role change event. ID: txHash-logIndex
type RoleChange @entity {
  id: ID!
  vault: Vault!
  chainId: Int!

  selector: Bytes!
  role: Int!

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Seal event types
enum SealEventType {
  PREPARED
  SEALED
}

# Seal event - system sealing. ID: txHash-logIndex
type SealEvent @entity {
  id: ID!
  vault: Vault!
